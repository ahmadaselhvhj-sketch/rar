<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عجلة الحظ - Ichancy</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .container {
            text-align: center;
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            max-width: 600px;
            width: 90%;
        }
        h1 {
            font-size: 2em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .wheel-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 20px auto;
        }
        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
        }
        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 40px solid gold;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.3));
            z-index: 10;
        }
        .spin-btn {
            background: gold;
            color: #333;
            border: none;
            padding: 15px 40px;
            font-size: 1.2em;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            margin: 20px 0;
            transition: transform 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .spin-btn:hover {
            transform: scale(1.05);
        }
        .spin-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .message {
            font-size: 1.1em;
            margin-top: 20px;
            padding: 10px;
            border-radius: 10px;
            background: rgba(0,0,0,0.3);
        }
        .prize-info {
            font-size: 1.3em;
            font-weight: bold;
            color: gold;
            text-shadow: 1px 1px 2px black;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎡 عجلة الحظ</h1>
        <div class="wheel-container">
            <div class="pointer"></div>
            <canvas id="wheelCanvas" width="300" height="300"></canvas>
        </div>
        <button class="spin-btn" id="spinButton" disabled>⏳ جاري التحميل...</button>
        <div class="message" id="message"></div>
    </div>

    <script>
        // إعدادات العجلة
        const segments = [
            { label: '50', value: 50, color: '#FF6B6B' },
            { label: '100', value: 100, color: '#4ECDC4' },
            { label: '500', value: 500, color: '#45B7D1' },
            { label: '1000', value: 1000, color: '#96CEB4' },
            { label: '5%', value: 5, color: '#FFEEAD' },
            { label: '25%', value: 25, color: '#D4A5A5' }
        ];
        const segmentAngle = 360 / segments.length;

        // استخراج البيانات من الرابط
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('user');
        const prize = parseInt(urlParams.get('prize'));  // الجائزة التي حددها البوت

        let canSpin = false;
        let spinInProgress = false;

        // عنوان Google Apps Script
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxcQVjYwUOBAUyV4qjmrxE4gR8CNq2nfPSHulDr2XDLpgVW9YtR53lGXE5SaykijRbw/exec';  // ضع رابط التطبيق الخاص بك

        // رسم العجلة
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');

        function drawWheel(rotateAngle = 0) {
            ctx.clearRect(0, 0, 300, 300);
            for (let i = 0; i < segments.length; i++) {
                const startAngle = (i * segmentAngle + rotateAngle) * Math.PI / 180;
                const endAngle = ((i + 1) * segmentAngle + rotateAngle) * Math.PI / 180;
                
                ctx.beginPath();
                ctx.moveTo(150, 150);
                ctx.arc(150, 150, 150, startAngle, endAngle);
                ctx.closePath();
                ctx.fillStyle = segments[i].color;
                ctx.fill();
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 2;
                ctx.stroke();

                // إضافة النص
                ctx.save();
                ctx.translate(150, 150);
                ctx.rotate(startAngle + (segmentAngle / 2) * Math.PI / 180);
                ctx.textAlign = 'center';
                ctx.fillStyle = '#000';
                ctx.font = 'bold 16px Arial';
                ctx.fillText(segments[i].label, 80, 10);
                ctx.restore();
            }
        }

        drawWheel();

        // التحقق من إمكانية الدوران عبر Apps Script
        async function checkSpinEligibility() {
            try {
                const response = await fetch(`${APPS_SCRIPT_URL}?action=check&user=${userId}`);
                const data = await response.json();
                if (data.canSpin) {
                    canSpin = true;
                    document.getElementById('spinButton').disabled = false;
                    document.getElementById('spinButton').textContent = '🎲 ابدأ الدوران';
                } else {
                    canSpin = false;
                    document.getElementById('spinButton').disabled = true;
                    document.getElementById('spinButton').textContent = '⏳ انتظر 48 ساعة';
                    document.getElementById('message').innerHTML = `⏰ آخر دورة كانت في ${data.lastSpinDate}. يمكنك الدوران مرة أخرى بعد ${data.remainingHours} ساعة.`;
                }
            } catch (error) {
                console.error('خطأ في الاتصال:', error);
                document.getElementById('message').innerHTML = '⚠️ حدث خطأ في الاتصال، حاول مرة أخرى لاحقاً.';
            }
        }

        // دالة لجعل العجلة تستقر على الجائزة المحددة (prize)
        function getTargetAngle(prizeValue) {
            // البحث عن مؤشر القطعة المطابقة للجائزة
            const index = segments.findIndex(s => s.value === prizeValue);
            if (index === -1) return 0;
            // نحتاج لتدوير العجلة بحيث تشير العلامة (السهم) إلى منتصف القطعة المطلوبة
            // السهم يشير إلى الزاوية 90 درجة (نحو الأعلى). نريد أن يكون منتصف القطعة عند 90 درجة.
            // زاوية منتصف القطعة i = (i * 60 + 30) درجة. نريد أن تساوي 90 بعد الدوران.
            // الدوران = 90 - (i*60 + 30) = 60 - i*60
            const targetRotation = 60 - index * 60;  // بالدرجات
            // نضيف دورات كاملة (720 درجة) لجعل الدوران أسرع
            return targetRotation + 720;
        }

        // تسجيل الدورة بعد الانتهاء
        async function recordSpin(prizeValue) {
            try {
                const payload = {
                    action: 'record',
                    user: userId,
                    prize: prizeValue,
                    timestamp: Date.now() / 1000
                };
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',  // مهم لتجنب CORS
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                // مع no-cors لا يمكن قراءة الرد، نفترض النجاح
                console.log('تم إرسال التسجيل');
            } catch (error) {
                console.error('فشل تسجيل الدورة:', error);
            }
        }

        // معالج زر الدوران
        document.getElementById('spinButton').addEventListener('click', async function() {
            if (!canSpin || spinInProgress) return;

            spinInProgress = true;
            const btn = this;
            btn.disabled = true;
            btn.textContent = '🌀 جاري الدوران...';

            // تحديد زاوية الهدف (بناءً على الجائزة القادمة من البوت)
            const targetAngle = getTargetAngle(prize);

            // تطبيق الدوران
            canvas.style.transform = `rotate(${targetAngle}deg)`;

            // بعد انتهاء مدة الدوران (4 ثوان)
            setTimeout(async () => {
                // إعادة تعيين التحويل لإزالة التدوير (لأن canvas سيظل مدوراً)
                canvas.style.transform = 'rotate(0deg)';
                // إعادة رسم العجلة في الوضع الطبيعي ولكن مع إظهار الجائزة (نعرف أن السهم يشير للقطعة الصحيحة)
                // نعرض رسالة الجائزة
                const segment = segments.find(s => s.value === prize);
                document.getElementById('message').innerHTML = `🎉 تهانينا! لقد ربحت <span class="prize-info">${segment.label}</span>`;

                // تسجيل الدورة
                await recordSpin(prize);

                btn.textContent = '✅ تم الدوران';
                spinInProgress = false;
                canSpin = false;  // نمنع الدوران مرة أخرى
            }, 4000);  // نفس مدة transition
        });

        // بدء التحقق عند تحميل الصفحة
        checkSpinEligibility();
    </script>
</body>
</html>
